repos:
- repo: 
  rev: v5.0.0
  hooks:
  - id: check-symlinks
  - id: trailing-whitespace
    args: [--markdown-linebreak-ext=md]
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-toml
  - id: check-ast
  - id: check-added-large-files
  - id: check-merge-conflict
  - id: detect-private-key
  - id: debug-statements
- repo: 
  rev: 5.12.0
  hooks:
  - id: isort
- repo: 
  rev: 7.0.0
  hooks:
  - id: flake8
    args: [--max-line-length=127]
